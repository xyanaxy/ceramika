<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ceramica</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@200;300;400;600;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --beige-0: #FBF6EE;
    --beige-1: #F2E8D9;
    --beige-2: #E0CDB5;
    --brown-2: #9E7B55;
    --brown-3: #6B4F33;
    --brown-4: #3D2B1A;
    --blue:    #1C3F72;
    --blue-mid:#2E5FAA;
    --blue-glow:#4A80D4;
    --blue-sh: rgba(46,95,170,0.4);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:var(--brown-4);
    cursor:none;
  }

  /* CURSOR */
  .cursor {
    position:fixed; width:30px; height:30px;
    background:var(--beige-0); border-radius:50%;
    pointer-events:none; z-index:9999;
    transform:translate(-50%,-50%);
    transition:transform .15s, opacity .2s;
    mix-blend-mode:difference;
  }

  /* ── NAV ── */
  nav {
    position:fixed; top:0; left:0; width:100%; z-index:400;
    padding:28px 40px;
    display:flex; justify-content:space-between; align-items:center;
    pointer-events:none;
  }
  .nav-logo {
    font-family:'Work Sans', sans-serif; font-size:1.5rem; font-weight:600;
    letter-spacing:0.22em; color:var(--beige-0);
    text-shadow:0 0 20px rgba(0,0,0,0.5);
    text-decoration:none; pointer-events:all;
    transition:color .3s;
  }
  .nav-logo:hover { color:var(--blue-glow); }
  .nav-about, .nav-cv, .nav-portfolio {
    font-family:'Work Sans', sans-serif; font-weight:400;
    font-size:0.9rem; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--blue-glow); background:none; border:none;
    cursor:none; pointer-events:all;
    position:relative; padding-bottom:4px;
    transition:color .3s;
    text-shadow:0 0 20px rgba(0,0,0,0.5);
    text-decoration: none;
  }
  .nav-about {
    margin-left:auto;
    margin-right:18px;
  }
  .nav-cv {
    margin-right:18px;
  }
  .nav-about::after, .nav-cv::after, .nav-portfolio::after {
    content:''; position:absolute; bottom:0; left:0;
    width:0; height:1px;
    background:var(--blue-glow); box-shadow:0 0 8px var(--blue-sh);
    transition:width .4s;
  }
  .nav-about:hover, .nav-cv:hover, .nav-portfolio:hover { color:var(--blue-glow); }
  .nav-about:hover::after, .nav-cv:hover::after, .nav-portfolio:hover::after { width:100%; }

  /* ── GRID ── */
  #grid {
    position:fixed; inset:0;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    grid-template-rows:repeat(4, 1fr);
    transition:opacity .6s, filter .6s;
  }
  #grid.dimmed { opacity:0.08; filter:blur(3px); pointer-events:none; }

  /* TILE */
  .tile {
    position:relative;
    perspective:900px;
    cursor:none;
  }
  .tile-inner {
    width:100%; height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .72s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .tile.flipped .tile-inner {
    transform:rotateY(180deg);
  }
  .tile-front, .tile-back {
    position:absolute; inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    overflow:hidden;
  }
  .tile-front img {
    width:100%; height:100%; object-fit:cover; display:block;
    filter:grayscale(30%);
    transition:filter .4s, transform .6s;
  }
  /* already-viewed: slightly desaturated so you can track what you've seen */
  .tile.seen .tile-front img {
    filter:sepia(30%) contrast(0.95) saturate(0.7) brightness(0.88);
  }
  .tile:not(.flipped):hover .tile-front img {
    filter:grayscale(0%);
    transform:scale(1.06);
  }
  .tile-front::after {
    content:''; position:absolute; inset:0;
    box-shadow:inset 0 0 0 1.5px var(--brown-4);
    pointer-events:none; z-index:1;
  }

  /* BACK */
  .tile-back {
    transform:rotateY(180deg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:8px;
  }
  .tile-back::after {
    content:''; position:absolute; inset:0;
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.08);
    pointer-events:none;
  }
  .tile-back-label {
    font-family:'Work Sans', sans-serif; font-size:0.65rem;
    letter-spacing:0.22em; text-transform:uppercase;
    color:rgba(255,255,255,0.85); position:relative; z-index:1;
    text-shadow:0 1px 8px rgba(0,0,0,0.3);
  }
  .tile-back-num {
    font-family:'Work Sans', sans-serif;
    font-size:2.2rem; font-weight:300;
    color:rgba(255,255,255,0.6); position:relative; z-index:1;
    line-height:1;
  }

  /* back colours */
  .tile:nth-child(1)  .tile-back { background:#2E5FAA; }
  .tile:nth-child(2)  .tile-back { background:#8B6347; }
  .tile:nth-child(3)  .tile-back { background:#1C3F72; }
  .tile:nth-child(4)  .tile-back { background:#C4A882; }
  .tile:nth-child(5)  .tile-back { background:#4A80D4; }
  .tile:nth-child(6)  .tile-back { background:#6B4F33; }
  .tile:nth-child(7)  .tile-back { background:#3D2B1A; }
  .tile:nth-child(8)  .tile-back { background:#2E5FAA; }
  .tile:nth-child(9)  .tile-back { background:#D9BFA0; }
  .tile:nth-child(10) .tile-back { background:#1C3F72; }
  .tile:nth-child(11) .tile-back { background:#4A80D4; }
  .tile:nth-child(12) .tile-back { background:#8B6347; }
  .tile:nth-child(13) .tile-back { background:#C4A882; }
  .tile:nth-child(14) .tile-back { background:#2E5FAA; }
  .tile:nth-child(15) .tile-back { background:#6B4F33; }
  .tile:nth-child(16) .tile-back { background:#1C3F72; }
  .tile:nth-child(17) .tile-back { background:#D9BFA0; }
  .tile:nth-child(18) .tile-back { background:#4A80D4; }
  .tile:nth-child(19) .tile-back { background:#3D2B1A; }
  .tile:nth-child(20) .tile-back { background:#2E5FAA; }

  /* ── LIGHTBOX ── */
  #lightbox {
    position:fixed; inset:0; z-index:300;
    display:flex; align-items:center; justify-content:center;
    background:rgba(29,18,9,0);
    pointer-events:none;
    transition:background .45s;
  }
  #lightbox.open {
    background:rgba(29,18,9,0.88);
    pointer-events:all;
  }
  #lightbox.open #lb-img-wrap { opacity:1; transform:scale(1); }

  #lb-img-wrap {
    position:relative;
    max-width:72vw; max-height:82vh;
    opacity:0; transform:scale(0.88);
    transition:opacity .45s, transform .45s cubic-bezier(0.34,1.1,0.64,1);
    display:flex; align-items:center; justify-content:center;
  }
  #lb-img {
    max-width:100%; max-height:82vh;
    object-fit:contain; display:block;
    box-shadow:0 32px 80px rgba(0,0,0,0.6);
  }

  /* meta strip below image */
  #lb-meta {
    position:absolute; bottom:-40px; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
  }
  #lb-label {
    font-family:'Work Sans', sans-serif; font-size:0.65rem;
    letter-spacing:0.24em; text-transform:uppercase;
    color:rgba(251,246,238,0.5);
  }
  #lb-num {
    font-family:'Work Sans', sans-serif; font-size:0.65rem;
    letter-spacing:0.18em; color:rgba(251,246,238,0.35);
  }

  /* close button on lightbox */
  #lb-close {
    position:fixed; bottom:32px; right:40px;
    background:none; border:none; cursor:none;
    font-family:'Work Sans', sans-serif; font-size:0.68rem;
    letter-spacing:0.24em; text-transform:uppercase;
    color:rgba(251,246,238,0.55);
    display:flex; align-items:center; gap:10px;
    transition:color .3s;
    z-index:310;
    opacity:0; pointer-events:none;
    transition:opacity .4s, color .3s;
  }
  #lightbox.open #lb-close { opacity:1; pointer-events:all; }
  #lb-close::before {
    content:''; display:block; width:24px; height:1px;
    background:currentColor;
  }
  #lb-close:hover { color:var(--blue-glow); }

  /* ── HINT ── */
  .hint {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    font-family:'Work Sans', sans-serif; font-weight:300;
    font-size:0.65rem; letter-spacing:0.28em; text-transform:uppercase;
    color:#1C3F72; z-index:50;
    transition:opacity 1.2s;
    pointer-events:none;
  }
  .hint.gone { opacity:0; }
</style>
</head>
<body>

<script>
  // ── Cursor ──
  const cur = document.getElementById('cursor');
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px';
    cur.style.top  = my + 'px';
  });
  function cursorBig()  { cur.style.transform = 'translate(-50%,-50%) scale(1.8)'; }
  function cursorNorm() { cur.style.transform = 'translate(-50%,-50%) scale(1)'; }
  document.querySelectorAll('button, a').forEach(el => {
    el.addEventListener('mouseenter', cursorBig);
    el.addEventListener('mouseleave', cursorNorm);
  });

  // ── Lightbox ──
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbLabel   = document.getElementById('lb-label');
  const lbNum     = document.getElementById('lb-num');
  const lbClose   = document.getElementById('lb-close');
  const hint      = document.getElementById('hint');
  let   activeTile = null;

  function openLightbox(tile) {
    const img   = tile.querySelector('.tile-front img');
    const n     = tile.dataset.n;
    const label = tile.dataset.label;
    lbImg.src   = img.src;
    lbLabel.textContent = label;
    lbNum.textContent   = '№ ' + n;
    activeTile  = tile;
    lightbox.classList.add('open');
    // hide hint on first interaction
    hint.classList.add('gone');
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    // slight delay so lightbox fades before flip starts
    if (activeTile) {
      setTimeout(() => {
        activeTile.classList.add('flipped', 'seen');
        activeTile = null;
      }, 200);
    }
  }

  lbClose.addEventListener('click', closeLightbox);

  // click backdrop to close
  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });

  // ── Tile clicks ──
  document.querySelectorAll('.tile').forEach(tile => {
    tile.addEventListener('mouseenter', cursorBig);
    tile.addEventListener('mouseleave', cursorNorm);

    tile.addEventListener('click', () => {
      if (tile.classList.contains('flipped')) {
        // already flipped — just unflip back to image
        tile.classList.remove('flipped');
      } else {
        // not yet seen — open lightbox
        openLightbox(tile);
      }
    });
  });

  // ESC closes lightbox
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (lightbox.classList.contains('open')) closeLightbox();
    }
  });
</script>
